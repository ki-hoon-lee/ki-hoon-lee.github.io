<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a0a"/>
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="sun-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#81d8d0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#81d8d0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="260" width="800" height="140" fill="#0d0d0d"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Sun -->
  <circle cx="680" cy="80" r="40" fill="none" stroke="#81d8d0" stroke-width="1" opacity="0.3"/>
  <circle cx="680" cy="80" r="28" fill="none" stroke="#81d8d0" stroke-width="1.5" opacity="0.5"/>
  <circle cx="680" cy="80" r="16" fill="rgba(129,216,208,0.15)" stroke="#81d8d0" stroke-width="2" opacity="0.8"/>
  <!-- Sun rays -->
  <g stroke="#81d8d0" stroke-width="1" opacity="0.3">
    <line x1="680" y1="30" x2="680" y2="18"/><line x1="680" y1="130" x2="680" y2="142"/>
    <line x1="630" y1="80" x2="618" y2="80"/><line x1="730" y1="80" x2="742" y2="80"/>
    <line x1="645" y1="45" x2="636" y2="36"/><line x1="715" y1="115" x2="724" y2="124"/>
    <line x1="715" y1="45" x2="724" y2="36"/><line x1="645" y1="115" x2="636" y2="124"/>
  </g>
  <!-- Solar panels - row 1 (perspective) -->
  <g opacity="0.9">
    <!-- Panel 1 -->
    <polygon points="60,230 160,210 160,240 60,260" fill="#0d1a17" stroke="#81d8d0" stroke-width="1"/>
    <line x1="86" y1="225" x2="86" y2="255" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <line x1="112" y1="220" x2="112" y2="250" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <line x1="138" y1="215" x2="138" y2="245" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <line x1="60" y1="242" x2="160" y2="222" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <!-- Panel 2 -->
    <polygon points="180,225 280,205 280,235 180,255" fill="#0d1a17" stroke="#81d8d0" stroke-width="1"/>
    <line x1="206" y1="220" x2="206" y2="250" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <line x1="232" y1="215" x2="232" y2="245" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <line x1="258" y1="210" x2="258" y2="240" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <line x1="180" y1="237" x2="280" y2="217" stroke="#81d8d0" stroke-width="0.5" opacity="0.4"/>
    <!-- Panel 3 -->
    <polygon points="300,220 400,200 400,230 300,250" fill="#0d1a17" stroke="#52d9a8" stroke-width="1"/>
    <line x1="326" y1="215" x2="326" y2="245" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <line x1="352" y1="210" x2="352" y2="240" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <line x1="378" y1="205" x2="378" y2="235" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <line x1="300" y1="232" x2="400" y2="212" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <!-- Panel 4 -->
    <polygon points="420,215 520,195 520,225 420,245" fill="#0d1a17" stroke="#52d9a8" stroke-width="1"/>
    <line x1="446" y1="210" x2="446" y2="240" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <line x1="472" y1="205" x2="472" y2="235" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <line x1="498" y1="200" x2="498" y2="230" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
    <line x1="420" y1="227" x2="520" y2="207" stroke="#52d9a8" stroke-width="0.5" opacity="0.4"/>
  </g>
  <!-- Row 2 panels (further back, smaller) -->
  <g opacity="0.5">
    <polygon points="80,185 155,173 155,193 80,205" fill="#0d1a17" stroke="#81d8d0" stroke-width="0.8"/>
    <polygon points="175,180 250,168 250,188 175,200" fill="#0d1a17" stroke="#81d8d0" stroke-width="0.8"/>
    <polygon points="270,175 345,163 345,183 270,195" fill="#0d1a17" stroke="#52d9a8" stroke-width="0.8"/>
    <polygon points="365,170 440,158 440,178 365,190" fill="#0d1a17" stroke="#52d9a8" stroke-width="0.8"/>
  </g>
  <!-- Energy output chart -->
  <rect x="560" y="150" width="200" height="100" fill="rgba(0,0,0,0.5)" stroke="#1e1e1e" stroke-width="1"/>
  <text x="572" y="168" font-family="monospace" font-size="8" fill="#555" letter-spacing="2">POWER OUTPUT (kW)</text>
  <polyline points="572,230 592,215 612,195 632,180 652,185 672,170 692,178 712,165 732,172 752,160" fill="none" stroke="#81d8d0" stroke-width="1.5" opacity="0.9"/>
  <polyline points="572,235 592,225 612,210 632,200 652,205 672,195 692,200 712,190 732,195 752,185" fill="none" stroke="#52d9a8" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <!-- Label -->
  <text x="400" y="388" text-anchor="middle" font-family="monospace" font-size="11" fill="#2a2a2a" letter-spacing="3">PHOTOVOLTAIC FARM · ENERGY OPTIMISATION</text>
</svg>
